name: test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  fastapi-cookie-auth:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/fastapi_cookie_auth
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[test]"
      - run: python -m pytest

  cookie-auth-client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cookie_auth_client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter test
      - run: flutter analyze
